- name: Initial server bootstrap
  hosts: bootstrap
  gather_facts: false


  tasks:
    - name: Install Python and package (если нет)
      raw: apt-get update && apt-get install -y \
        python3 \
        python3-pip \         
        python3-apt \
        python3-simplejson \
        python3-six \
        python3-setuptools \
        python3-yaml \        
        python3-jinja2 \
        make \
      tags: first-setup

    - name: Gather facts
      setup:
      tags: install
    
    - name: Create ansible user
      user:
        name: ansible
        state: present
        shell: /bin/bash
        groups: sudo
        append: yes
      tags: install

    - name: Deploy SSH key
      authorized_key:
        user: ansible
        state: present
        key: "{{ lookup('file', '{{ playbook_dir }}/../ssh/ansible_id_rsa.pub') }}"
      tags: install
    
    - name: Configure passwordless sudo
      lineinfile:
        path: /etc/sudoers.d/ansible
        line: "ansible ALL=(ALL) NOPASSWD:ALL"
        create: yes
        mode: '0440'
      tags: install
